# -----------------------------------------------------------------------------
# Terraform Validate — buildspec.yml
# Runs terraform validate and terraform fmt -check before the plan stage.
#
# Required environment variables:
#   TF_VERSION       — Terraform version to install
#   TF_WORKING_DIR   — Directory containing Terraform configuration
#
# Requirements: 13.1
# -----------------------------------------------------------------------------

version: 0.2

phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION:-1.5.7}..."
      - TF_VER="${TF_VERSION:-1.5.7}"
      - curl -sL "https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip" -o terraform.zip
      - unzip -o terraform.zip -d /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - echo "Initializing Terraform (backend disabled for validation)..."
      - cd ${TF_WORKING_DIR:-.}
      - terraform init -backend=false -input=false

  build:
    commands:
      - echo "Running terraform validate..."
      - cd ${TF_WORKING_DIR:-.}
      - terraform validate
      - echo "Running terraform fmt -check..."
      - terraform fmt -check -recursive -diff
      - echo "Validation passed."

  post_build:
    commands:
      - echo "Terraform validation complete."
