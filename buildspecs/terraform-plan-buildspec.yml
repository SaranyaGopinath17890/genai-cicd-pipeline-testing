# -----------------------------------------------------------------------------
# Terraform Plan — buildspec.yml
# Runs terraform init and terraform plan, storing the plan output as an artifact.
#
# Required environment variables (set by CodeBuild project):
#   TF_VERSION       — Terraform version to install (e.g., 1.5.7)
#   TF_WORKING_DIR   — Directory containing Terraform configuration
#   TF_VAR_FILE      — Path to the .tfvars file (optional)
#   AWS_DEFAULT_REGION — AWS region
#
# Requirements: 5.1, 5.3
# -----------------------------------------------------------------------------

version: 0.2

phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION:-1.5.7}..."
      - TF_VER="${TF_VERSION:-1.5.7}"
      - curl -sL "https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip" -o terraform.zip
      - unzip -o terraform.zip -d /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - echo "Initializing Terraform..."
      - cd ${TF_WORKING_DIR:-.}
      - |
        if [ -n "${TFVARS_BUCKET}" ] && [ -n "${ENVIRONMENT}" ]; then
          echo "Retrieving tfvars from S3..."
          aws s3 cp "s3://${TFVARS_BUCKET}/${ENVIRONMENT}.tfvars" "./environments/${ENVIRONMENT}.tfvars" || echo "Warning: No tfvars found in S3, using local if available"
          export TF_VAR_FILE="./environments/${ENVIRONMENT}.tfvars"
        fi
      - terraform init -input=false

  build:
    commands:
      - echo "Running Terraform plan..."
      - cd ${TF_WORKING_DIR:-.}
      - |
        if [ -n "${TF_VAR_FILE}" ]; then
          terraform plan -input=false -var-file="${TF_VAR_FILE}" -out=tfplan
        else
          terraform plan -input=false -out=tfplan
        fi
      - echo "Generating plan summary..."
      - terraform show -no-color tfplan > plan-output.txt
      - echo "--- Plan Summary ---"
      - tail -20 plan-output.txt

  post_build:
    commands:
      - echo "Terraform plan complete."
      - |
        if [ -n "${GITHUB_TOKEN_SECRET_ARN}" ] && [ -n "${GITHUB_REPO}" ] && [ -n "${CODEBUILD_WEBHOOK_TRIGGER}" ]; then
          echo "Posting plan summary to GitHub PR..."
          GITHUB_TOKEN=$(aws secretsmanager get-secret-value --secret-id "${GITHUB_TOKEN_SECRET_ARN}" --query SecretString --output text)
          PR_NUMBER=$(echo $CODEBUILD_WEBHOOK_TRIGGER | grep -oP 'pr/\K\d+' || echo "")
          if [ -n "$PR_NUMBER" ]; then
            PLAN_SUMMARY=$(head -100 ${TF_WORKING_DIR:-.}/plan-output.txt)
            COMMENT_BODY=$(printf '{"body":"### Terraform Plan Summary\n```\n%s\n```"}' "$PLAN_SUMMARY")
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${GITHUB_REPO}/issues/${PR_NUMBER}/comments" \
              -d "$COMMENT_BODY" || echo "Warning: Failed to post PR comment"
          else
            echo "Not a PR build — skipping PR comment."
          fi
        fi

artifacts:
  files:
    - "${TF_WORKING_DIR:-.}/tfplan"
    - "${TF_WORKING_DIR:-.}/plan-output.txt"
  discard-paths: no

cache:
  paths:
    - "${TF_WORKING_DIR:-.}/.terraform/**/*"
