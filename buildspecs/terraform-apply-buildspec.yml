# -----------------------------------------------------------------------------
# Terraform Apply — buildspec.yml
# Runs terraform init and terraform apply using the approved plan.
#
# Required environment variables (set by CodeBuild project):
#   TF_VERSION       — Terraform version to install (e.g., 1.5.7)
#   TF_WORKING_DIR   — Directory containing Terraform configuration
#   TF_VAR_FILE      — Path to the .tfvars file (optional)
#   AWS_DEFAULT_REGION — AWS region
#
# Requirements: 5.3
# -----------------------------------------------------------------------------

version: 0.2

phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION:-1.5.7}..."
      - TF_VER="${TF_VERSION:-1.5.7}"
      - curl -sL "https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip" -o terraform.zip
      - unzip -o terraform.zip -d /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - echo "Initializing Terraform..."
      - cd ${TF_WORKING_DIR:-.}
      - |
        if [ -n "${TFVARS_BUCKET}" ] && [ -n "${ENVIRONMENT}" ]; then
          echo "Retrieving tfvars from S3..."
          aws s3 cp "s3://${TFVARS_BUCKET}/${ENVIRONMENT}.tfvars" "./environments/${ENVIRONMENT}.tfvars" || echo "Warning: No tfvars found in S3, using local if available"
          export TF_VAR_FILE="./environments/${ENVIRONMENT}.tfvars"
        fi
      - terraform init -input=false

  build:
    commands:
      - echo "Running Terraform apply..."
      - cd ${TF_WORKING_DIR:-.}
      - |
        if [ -n "${TF_VAR_FILE}" ]; then
          terraform apply -input=false -auto-approve -var-file="${TF_VAR_FILE}"
        else
          terraform apply -input=false -auto-approve
        fi

  post_build:
    commands:
      - echo "Terraform apply complete."

cache:
  paths:
    - "${TF_WORKING_DIR:-.}/.terraform/**/*"
